name: Sync Upstream Branch

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch and push upstream branch
        run: |
          UPSTREAM_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }} | jq -r .parent.clone_url)
          
          if [ "$UPSTREAM_URL" == "null" ]; then
            echo "Error: This repository is not a fork. Cannot automatically find upstream."
            exit 1
          fi

          DEFAULT_BRANCH=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }} | jq -r .parent.default_branch)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream "$UPSTREAM_URL"
          git fetch upstream "$DEFAULT_BRANCH"

          # Push the exact commit from the upstream default branch to our local upstream branch
          git push origin FETCH_HEAD:refs/heads/upstream --force
